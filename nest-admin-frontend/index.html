<!DOCTYPE html>
<html lang="zh-cn">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="renderer" content="webkit">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="icon" href="/static/logo.svg">
  <title>%VITE_APP_TITLE%</title>
  <style>
    @import url('/static/var.css');

    #loading {
      font-size: 50px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-1em, -1em);
    }

    #loading.loaded {
      opacity: 0;
      transition: all 0.15s ease-out;
      z-index: -1;
    }


    .petal {
      position: absolute;
      width: 1em;
      height: 1em;
      background: hsl(345, 82%, 54%);
      border-radius: 100% 100% 0 100%;
      transform-origin: 100% 50%;
    }

    .petal:nth-of-type(1) {
      animation: rotate 1s linear infinite;
    }

    .petal:nth-of-type(2) {
      animation: rotate 1s linear infinite .2s;
    }

    .petal:nth-of-type(3) {
      animation: rotate 1s linear infinite .4s;
    }

    .petal:nth-of-type(4) {
      animation: rotate 1s linear infinite .6s;
    }

    .petal:nth-of-type(5) {
      animation: rotate 1s linear infinite .8s;
    }

    @keyframes rotate {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
  <script src="/static/config.js"></script>
  <script src="https://hm.baidu.com/hm.js?0bf08b7ffaa1d3b60c5d69213ad7d5f7"></script>
</head>

<body>
  <div id="app"></div>
  <div id="common-top-right"></div>

  <div id="loading">
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
